---
- name: Configurar IPv6 en Loopback 1
  hosts: routers
  gather_facts: no
  connection: network_cli

  tasks:
    - name: Asignar IP Global y Link-Local IPv6
      ios_config:
        lines:
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
        parents: interface Loopback1
